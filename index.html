<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fafafa">
<title>Mouth Mixer</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::selection{background:#ff6d2e22}
:root{
  --bg:#fafafa;--bg2:#f2f2f7;--card:#fff;
  --t1:#1d1d1f;--t2:#86868b;--t3:#aeaeb2;--t4:#c7c7cc;--t5:#e5e5e7;
  --acc:#ff6d2e;--danger:#ff3b30;
  --font:'SF Mono',ui-monospace,'Fira Code','Cascadia Code','Consolas',monospace;
  --r:12px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);background:var(--bg);color:var(--t1);
  -webkit-font-smoothing:antialiased;display:flex;justify-content:center;
}
#app{width:100%;max-width:460px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{padding:env(safe-area-inset-top,20px) 24px 0;padding-top:max(env(safe-area-inset-top),20px);flex-shrink:0}
.hdr-sub{font-size:9px;letter-spacing:5px;color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.hdr-title{font-size:22px;font-weight:600;letter-spacing:-0.3px}

/* Tabs */
.tabs{display:flex;padding:16px 24px 0;flex-shrink:0}
.tab{flex:1;padding:10px 0;background:none;border:none;border-bottom:2px solid transparent;
  color:var(--t3);font-size:9px;font-family:var(--font);cursor:pointer;letter-spacing:2px;
  text-transform:uppercase;font-weight:400;transition:all .25s}
.tab.on{color:var(--t1);font-weight:600;border-bottom-color:var(--t1)}

/* Scrollable content */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 24px 120px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* Waveform */
.wave-box{height:72px;border-radius:14px;background:var(--bg2);margin-bottom:24px;overflow:hidden;position:relative}
.wave-box canvas{width:100%;height:100%;display:block}
.wave-empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;color:var(--t4);letter-spacing:3px}
.wave-bars{display:flex;align-items:center;height:100%;padding:0 16px;gap:2px}
.wave-bar{flex:1;min-width:2px;border-radius:1px;background:var(--t5);transition:background .05s}
.wave-bar.lit{background:var(--acc)}
.wave-head{position:absolute;top:0;width:2px;height:100%;background:var(--acc);border-radius:1px}

/* Record area */
.rec-area{display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:28px}
.timer{font-size:36px;font-weight:200;letter-spacing:2px;font-variant-numeric:tabular-nums}
.timer span{font-size:13px;color:var(--t4);font-weight:400}
.rec-btn{
  width:60px;height:60px;border:none;cursor:pointer;
  background:var(--acc);transition:border-radius .25s;
  box-shadow:0 2px 8px rgba(255,109,46,.25);
  display:flex;align-items:center;justify-content:center;
}
.rec-btn.idle{border-radius:30px}
.rec-btn.on{border-radius:16px;animation:breathe 1.2s ease-in-out infinite}
.rec-dot{width:22px;height:22px;border-radius:11px;background:#fff}
.rec-stop{width:18px;height:18px;border-radius:4px;background:#fff}
.progress-bar{width:100%;height:2px;border-radius:1px;background:var(--t5);overflow:hidden}
.progress-fill{height:100%;background:var(--acc);transition:width .1s linear;border-radius:1px}

@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(.92)}}

/* Buttons */
.btn{
  width:100%;padding:14px;border-radius:var(--r);border:none;
  font-size:10px;font-family:var(--font);cursor:pointer;
  letter-spacing:1.5px;font-weight:500;text-transform:uppercase;transition:all .2s;
}
.btn-outline{background:var(--card);border:1.5px solid var(--t5);color:var(--t1)}
.btn-primary{background:var(--t1);color:var(--bg);font-weight:600;letter-spacing:2px}
.btn-primary:disabled{background:var(--t5);color:var(--t3);cursor:default}
.btn-accent{background:var(--acc);color:#fff;font-weight:600;letter-spacing:2px}
.btn-ghost{background:none;border:1.5px solid var(--t5);color:var(--t3)}
.btn-row{display:flex;gap:8px;margin-top:8px}

/* Input */
.input{
  width:100%;padding:13px 16px;border-radius:var(--r);border:1.5px solid var(--t5);
  background:var(--card);font-size:13px;font-family:var(--font);color:var(--t1);outline:none;
}
.input::placeholder{color:var(--t4)}

/* Effects */
.fx-section{margin-top:32px;margin-bottom:16px}
.fx-label{font-size:9px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-bottom:12px}
.fx-cat{margin-bottom:4px}
.fx-header{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;border-radius:var(--r);border:1.5px solid var(--t5);
  background:var(--card);cursor:pointer;font-family:var(--font);font-size:10px;transition:border-radius .15s;
}
.fx-header.open{border-radius:12px 12px 0 0;border-bottom:1px solid var(--bg2)}
.fx-header-left{color:var(--t1);font-weight:500;letter-spacing:1.5px;text-transform:uppercase}
.fx-header-right{display:flex;align-items:center;gap:8px}
.fx-dot{width:6px;height:6px;border-radius:3px;background:var(--acc)}
.fx-body{padding:16px;background:var(--card);border-radius:0 0 12px 12px;border:1.5px solid var(--t5);border-top:none}
.fx-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0}
.fx-chips.has-active{margin-bottom:20px}
.fx-chip{
  padding:8px 14px;border-radius:8px;border:1.5px solid var(--t5);background:var(--bg);
  color:var(--t2);font-size:10px;font-family:var(--font);cursor:pointer;font-weight:500;
  letter-spacing:.5px;transition:all .15s;
}
.fx-chip.on{border-color:var(--t1);background:var(--t1);color:var(--bg)}
.fx-slider-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:9px;color:var(--t3);letter-spacing:1px}
.fx-slider-row span:first-child{text-transform:uppercase}
.fx-slider-row span:last-child{font-variant-numeric:tabular-nums;color:var(--t1);font-weight:500}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:var(--t5);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--acc);cursor:pointer;border:3px solid var(--bg);box-shadow:0 1px 3px rgba(0,0,0,.12)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--acc);cursor:pointer;border:3px solid var(--bg);box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* Library */
.lib-empty{text-align:center;padding:56px 0}
.lib-empty-icon{width:40px;height:40px;border-radius:20px;border:1.5px solid var(--t5);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;color:var(--t4);font-size:16px}
.lib-empty-text{font-size:10px;color:var(--t4);letter-spacing:2px}
.lib-item{padding:16px;border-radius:14px;background:var(--card);border:1.5px solid var(--t5);margin-bottom:6px}
.lib-item-row{display:flex;justify-content:space-between;align-items:flex-start}
.lib-name{font-size:13px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lib-date{font-size:9px;color:var(--t4);letter-spacing:1px;font-variant-numeric:tabular-nums}
.lib-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.lib-tag{padding:3px 8px;border-radius:6px;font-size:9px;background:var(--bg2);color:var(--t2);letter-spacing:.5px;font-weight:500}
.lib-actions{display:flex;gap:4px;margin-left:12px;flex-shrink:0}
.icon-btn{
  width:32px;height:32px;border-radius:8px;border:1.5px solid var(--t5);background:var(--bg);
  color:var(--t1);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:var(--font);transition:background .15s;
}
.icon-btn.danger{color:var(--danger)}

/* Sticky Player */
.sticky-player{flex-shrink:0;padding:0 24px;background:var(--bg);position:relative;z-index:10}
.sticky-player:empty{display:none}
.sp-wave{height:56px;border-radius:12px;background:var(--bg2);margin-bottom:10px;overflow:hidden;position:relative}
.sp-wave .wave-bars{height:100%;padding:0 12px}
.sp-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.sp-play{
  width:40px;height:40px;border-radius:20px;border:none;background:var(--t1);color:var(--bg);
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--font);transition:all .15s;
}
.sp-play:active{transform:scale(.93)}
.sp-time{font-size:10px;color:var(--t3);letter-spacing:1px;font-variant-numeric:tabular-nums}
.sp-name{font-size:11px;color:var(--t1);font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── COMPOSER ─── */
.comp-sticky{flex-shrink:0;background:var(--bg);padding:0 16px 8px;z-index:10}
.comp-master-wave{height:40px;border-radius:10px;background:var(--bg2);position:relative;overflow:hidden;margin-bottom:8px;touch-action:none}
.comp-master-wave canvas{width:100%;height:100%;display:block}
.comp-controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.comp-btn{
  height:32px;padding:0 10px;border-radius:8px;border:1.5px solid var(--t5);background:var(--card);
  color:var(--t1);font-size:9px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:4px;
  letter-spacing:.5px;font-weight:500;white-space:nowrap;
}
.comp-btn.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.comp-btn.acc{background:var(--acc);color:#fff;border-color:var(--acc)}
.comp-btn:active{transform:scale(.96)}
.comp-bpm{display:flex;align-items:center;gap:2px}
.comp-bpm input{width:36px;text-align:center;border:none;background:transparent;font-family:var(--font);font-size:10px;color:var(--t1);font-weight:600;font-variant-numeric:tabular-nums}
.comp-bpm button{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--t5);background:var(--card);font-size:12px;font-family:var(--font);cursor:pointer;color:var(--t1);display:flex;align-items:center;justify-content:center}
.comp-vol{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t3)}
.comp-vol input[type=range]{width:60px}
.comp-timeline{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.comp-timeline::-webkit-scrollbar{display:none}
.comp-track{background:var(--card);border:1.5px solid var(--t5);border-radius:10px;margin-bottom:4px;overflow:hidden}
.comp-track-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--bg2)}
.comp-track-name{font-size:10px;font-weight:600;letter-spacing:.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.comp-track-vol{width:50px}
.comp-track-mute{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--t5);background:var(--bg);font-size:8px;font-family:var(--font);cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;letter-spacing:.5px;font-weight:600}
.comp-track-mute.on{background:var(--danger);color:#fff;border-color:var(--danger)}
.comp-track-add-clip{height:26px;padding:0 8px;border-radius:6px;border:1.5px solid var(--t5);background:var(--bg);font-size:9px;font-family:var(--font);cursor:pointer;color:var(--t2);letter-spacing:.5px}
.comp-lane{height:48px;position:relative;overflow:hidden;touch-action:none}
.comp-clip{
  position:absolute;top:4px;height:40px;border-radius:6px;background:var(--acc);opacity:.85;
  display:flex;align-items:center;padding:0 6px;font-size:8px;color:#fff;font-weight:600;
  letter-spacing:.3px;overflow:hidden;white-space:nowrap;cursor:grab;user-select:none;
  border:1.5px solid rgba(255,255,255,.3);
}
.comp-clip.selected{opacity:1;border-color:#fff;box-shadow:0 0 0 2px var(--acc)}
.comp-clip .trim-l,.comp-clip .trim-r{position:absolute;top:0;width:10px;height:100%;cursor:ew-resize;z-index:2}
.comp-clip .trim-l{left:0;border-radius:6px 0 0 6px}
.comp-clip .trim-r{right:0;border-radius:0 6px 6px 0}
.comp-grid-line{position:absolute;top:0;height:100%;width:1px;background:var(--t5);opacity:.4;pointer-events:none}
.comp-playhead{position:absolute;top:0;height:100%;width:2px;background:var(--danger);z-index:5;pointer-events:none;border-radius:1px}
.comp-loop-region{position:absolute;top:0;height:100%;background:rgba(0,229,255,.08);border-left:2px solid rgba(0,229,255,.4);border-right:2px solid rgba(0,229,255,.4);pointer-events:none;z-index:1}
.comp-footer{flex-shrink:0;padding:8px 16px;background:var(--bg);display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--t5)}
.comp-clip-menu{position:fixed;z-index:100;background:var(--card);border:1.5px solid var(--t5);border-radius:12px;padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);min-width:180px}
.comp-clip-menu .cm-title{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;color:var(--t2)}
.comp-clip-menu .cm-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:10px}
.comp-clip-menu .cm-row:last-child{margin-bottom:0}
.comp-clip-menu .cm-row label{color:var(--t2);letter-spacing:.5px}
.comp-clip-menu .cm-row input[type=range]{width:80px}
.comp-overlay{position:fixed;inset:0;z-index:99;background:transparent}
.comp-dropdown{position:fixed;z-index:100;background:var(--card);border:1.5px solid var(--t5);border-radius:12px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,.12);max-height:200px;overflow-y:auto;min-width:180px}
.comp-dropdown-item{padding:8px 10px;border-radius:8px;font-size:10px;font-family:var(--font);cursor:pointer;color:var(--t1);letter-spacing:.3px}
.comp-dropdown-item:active{background:var(--bg2)}
.comp-colors{--c0:#ff6d2e;--c1:#5856d6;--c2:#34c759;--c3:#ff9500;--c4:#af52de;--c5:#00c7be;--c6:#ff2d55;--c7:#007aff}

/* Footer */
.footer{padding:24px;text-align:center;font-size:8px;color:var(--t5);letter-spacing:3px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-sub">Mouth</div>
    <div class="hdr-title">Mixer</div>
  </div>
  <div id="sticky-player" class="sticky-player"></div>
  <div class="tabs">
    <button class="tab on" id="tab-mixer" onclick="switchTab('mixer')">Mixer</button>
    <button class="tab" id="tab-lib" onclick="switchTab('lib')">Library · <span id="lib-count">0</span></button>
    <button class="tab" id="tab-comp" onclick="switchTab('comp')">Composer</button>
  </div>
  <div class="content" id="view-mixer"></div>
  <div class="content" id="view-lib" style="display:none"></div>
  <!-- Composer: custom layout, no .content padding -->
  <div id="view-comp" style="display:none;flex:1;overflow:hidden;flex-direction:column"></div>
</div>

<script>
/* ═══════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════ */
const CATS = [
  {id:'dynamik',label:'Dynamics',effects:['None','Kompressor','Limiter','Gate'],param:e=>e==='Gate'?'Threshold':'Amount'},
  {id:'zeitbasiert',label:'Time',effects:['None','Delay','Reverb','Slapback'],param:()=>'Mix'},
  {id:'modulation',label:'Modulation',effects:['None','Chorus','Flanger','Tremolo','Vibrato'],param:()=>'Depth'},
  {id:'frequenz',label:'Filter',effects:['None','LowPass','HighPass','BandPass','Wah-Wah'],param:e=>e==='Wah-Wah'?'Speed':'Cutoff'},
  {id:'distortion',label:'Drive',effects:['None','Overdrive','Distortion','Fuzz','Saturation'],param:()=>'Drive'},
  {id:'instruments',label:'Instruments',effects:['None','Drum','Piano','Violin','Saxophone','Guitar','Flute'],param:()=>'Intensity'},
  {id:'spezial',label:'Special',effects:['None','Pitch Shifter','Bitcrusher'],param:e=>e==='Pitch Shifter'?'Pitch':'Crush'},
];

function defaultFx(){return Object.fromEntries(CATS.map(c=>[c.id,{type:'None',value:0.5}]))}

/* ═══════════════════════════════════════
   STATE
   ═══════════════════════════════════════ */
let sequences = [];
let audioCtx = null;
let mediaRec = null;
let recChunks = [];
let recTimer = null;
let recTime = 0;
let isRecording = false;
let currentBuf = null;
let currentB64 = null;
let currentWf = [];
let currentFx = defaultFx();
let isPlaying = false;
let editId = null;
let openCat = null;
let sourceNode = null;
let lfoNodes = [];
let playStart = 0;
let playAnim = null;
let visAnim = null;
let analyserNode = null;
let streamRef = null;
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
async function ensureCtx(){
  const ctx=getCtx();
  if(ctx.state==='suspended'){
    try{await ctx.resume()}catch(e){}
  }
  return ctx;
}
// iOS: unlock audio on every touch — must be sync in gesture
function unlockAudio(){
  const ctx=getCtx();
  if(ctx.state!=='running'){
    ctx.resume();
    const b=ctx.createBuffer(1,1,22050);
    const s=ctx.createBufferSource();s.buffer=b;s.connect(ctx.destination);
    s.start(0);
  }
}
document.addEventListener('touchstart',unlockAudio,false);
document.addEventListener('touchend',unlockAudio,false);
document.addEventListener('click',unlockAudio,false);

/* ═══════════════════════════════════════
   INDEXEDDB
   ═══════════════════════════════════════ */
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('MouthMixer',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('audio');
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function dbPut(key,val){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction('audio','readwrite');tx.objectStore('audio').put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);})}
async function dbGet(key){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction('audio');const r=tx.objectStore('audio').get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
async function dbDel(key){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction('audio','readwrite');tx.objectStore('audio').delete(key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);})}

function loadSequences(){try{sequences=JSON.parse(localStorage.getItem('mm-seq')||'[]')}catch{sequences=[]}}
function saveSequences(){localStorage.setItem('mm-seq',JSON.stringify(sequences));document.getElementById('lib-count').textContent=sequences.length}

/* ═══════════════════════════════════════
   WAV ENCODE
   ═══════════════════════════════════════ */
function encodeWAV(buf){
  const sr=buf.sampleRate,ch=buf.numberOfChannels;
  const data=ch===1?buf.getChannelData(0):(()=>{const L=buf.getChannelData(0),R=buf.getChannelData(1),m=new Float32Array(L.length);for(let i=0;i<L.length;i++)m[i]=(L[i]+R[i])/2;return m})();
  const ab=new ArrayBuffer(44+data.length*2),v=new DataView(ab);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
  w(0,'RIFF');v.setUint32(4,36+data.length*2,true);w(8,'WAVE');w(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);
  v.setUint16(34,16,true);w(36,'data');v.setUint32(40,data.length*2,true);
  for(let i=0,o=44;i<data.length;i++,o+=2){const s=Math.max(-1,Math.min(1,data[i]));v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true)}
  return ab;
}
function ab2b64(buf){const b=new Uint8Array(buf);let s='';for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s)}
function b642ab(b64){const s=atob(b64),b=new Uint8Array(s.length);for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b.buffer}

function extractWf(buf,n=120){
  const ch=buf.getChannelData(0),step=Math.floor(ch.length/n),w=[];
  for(let i=0;i<n;i++){let s=0;for(let j=0;j<step;j++)s+=Math.abs(ch[i*step+j]||0);w.push(s/step)}
  return w;
}

/* ═══════════════════════════════════════
   EFFECTS CHAIN
   ═══════════════════════════════════════ */
function createReverbIR(ctx,dur,decay){
  const len=ctx.sampleRate*dur,ir=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let c=0;c<2;c++){const d=ir.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay)}
  return ir;
}
function makeDistCurve(a){
  const n=44100,c=new Float32Array(n),d=Math.PI/180;
  for(let i=0;i<n;i++){const x=(i*2)/n-1;c[i]=((3+a*100)*x*20*d)/(Math.PI+a*100*Math.abs(x))}
  return c;
}

function buildChain(ctx,fx){
  const nodes=[],lfos=[];
  // Dynamics
  const d=fx.dynamik;
  if(d.type==='Kompressor'||d.type==='Limiter'){
    const c=ctx.createDynamicsCompressor();c.threshold.value=d.type==='Limiter'?-3:-50+d.value*45;
    c.ratio.value=d.type==='Limiter'?20:1+d.value*19;c.attack.value=.003;c.release.value=.25;nodes.push(c);
  }else if(d.type==='Gate'){const g=ctx.createGain();g.gain.value=d.value<.1?0:1;nodes.push(g)}
  // Time
  const z=fx.zeitbasiert;
  if(z.type==='Delay'||z.type==='Slapback'){
    const dt=z.type==='Slapback'?.08:.1+z.value*.6,fb=z.type==='Slapback'?.2:z.value*.6;
    const del=ctx.createDelay(1);del.delayTime.value=dt;const fbg=ctx.createGain();fbg.gain.value=fb;
    const wet=ctx.createGain();wet.gain.value=.3+z.value*.5;const dry=ctx.createGain();const mrg=ctx.createGain();
    del.connect(fbg);fbg.connect(del);del.connect(wet);wet.connect(mrg);dry.connect(mrg);
    nodes.push({input:dry,output:mrg,splitInput:true,delay:del});
  }else if(z.type==='Reverb'){
    const conv=ctx.createConvolver();conv.buffer=createReverbIR(ctx,.5+z.value*3,1+z.value*3);
    const wet=ctx.createGain();wet.gain.value=z.value*.8;const dry=ctx.createGain();dry.gain.value=1-z.value*.3;
    const mrg=ctx.createGain();conv.connect(wet);wet.connect(mrg);dry.connect(mrg);
    nodes.push({input:dry,output:mrg,splitInput:true,convolver:conv});
  }
  // Modulation
  const m=fx.modulation;
  if(m.type==='Tremolo'){
    const g=ctx.createGain(),l=ctx.createOscillator(),lg=ctx.createGain();
    l.frequency.value=1+m.value*15;lg.gain.value=.1+m.value*.8;
    l.connect(lg);lg.connect(g.gain);l.start();lfos.push(l);nodes.push(g);
  }else if(m.type==='Chorus'||m.type==='Flanger'){
    const isC=m.type==='Chorus';const del=ctx.createDelay(.1);del.delayTime.value=isC?.025:.005;
    const l=ctx.createOscillator(),lg=ctx.createGain();
    l.frequency.value=isC?.5+m.value*3:.1+m.value*2;lg.gain.value=isC?.002+m.value*.008:.001+m.value*.004;
    l.connect(lg);lg.connect(del.delayTime);l.start();lfos.push(l);
    const wet=ctx.createGain();wet.gain.value=isC?.5:.7;const dry=ctx.createGain();dry.gain.value=isC?.8:.7;
    const mrg=ctx.createGain();del.connect(wet);wet.connect(mrg);dry.connect(mrg);
    nodes.push({input:dry,output:mrg,splitInput:true,delay:del});
  }else if(m.type==='Vibrato'){
    const del=ctx.createDelay(.1);del.delayTime.value=.01;
    const l=ctx.createOscillator(),lg=ctx.createGain();
    l.frequency.value=2+m.value*10;lg.gain.value=.001+m.value*.006;
    l.connect(lg);lg.connect(del.delayTime);l.start();lfos.push(l);nodes.push(del);
  }
  // Filter
  const f=fx.frequenz;
  if(f.type!=='None'){
    const flt=ctx.createBiquadFilter();
    if(f.type==='Wah-Wah'){
      flt.type='bandpass';flt.Q.value=5+f.value*15;flt.frequency.value=800;
      const l=ctx.createOscillator(),lg=ctx.createGain();
      l.frequency.value=1+f.value*8;lg.gain.value=500+f.value*3000;
      l.connect(lg);lg.connect(flt.frequency);l.start();lfos.push(l);
    }else{
      flt.type={LowPass:'lowpass',HighPass:'highpass',BandPass:'bandpass'}[f.type];
      flt.frequency.value=200+f.value*8000;flt.Q.value=1+f.value*10;
    }
    nodes.push(flt);
  }
  // Distortion
  const di=fx.distortion;
  if(di.type!=='None'){
    const ws=ctx.createWaveShaper();
    ws.curve=makeDistCurve({Overdrive:di.value*.3,Distortion:di.value*.7,Fuzz:di.value,Saturation:di.value*.15}[di.type]||.5);
    ws.oversample='4x';nodes.push(ws);
  }
  // Instruments (formant / harmonic shaping)
  const inst=fx.instruments;
  if(inst&&inst.type!=='None'){
    const intensity=inst.value;
    const dry=ctx.createGain();dry.gain.value=1-intensity*.7;
    const wet=ctx.createGain();wet.gain.value=.3+intensity*.7;
    const mrg=ctx.createGain();dry.connect(mrg);wet.connect(mrg);
    if(inst.type==='Drum'){
      // Resonant lowpass for body + peak at low freq
      const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=200+intensity*300;lp.Q.value=5+intensity*15;
      const pk=ctx.createBiquadFilter();pk.type='peaking';pk.frequency.value=80;pk.gain.value=8+intensity*12;pk.Q.value=2;
      lp.connect(pk);pk.connect(wet);
      nodes.push({input:dry,output:mrg,splitInput:true,delay:lp});
    }else if(inst.type==='Piano'){
      // Bright resonant peaks at harmonic intervals
      const pk1=ctx.createBiquadFilter();pk1.type='peaking';pk1.frequency.value=260;pk1.gain.value=4+intensity*6;pk1.Q.value=3;
      const pk2=ctx.createBiquadFilter();pk2.type='peaking';pk2.frequency.value=2000;pk2.gain.value=3+intensity*5;pk2.Q.value=2;
      const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=80;hp.Q.value=1;
      pk1.connect(pk2);pk2.connect(hp);hp.connect(wet);
      nodes.push({input:dry,output:mrg,splitInput:true,delay:pk1});
    }else if(inst.type==='Violin'){
      // Body resonances + vibrato LFO
      const f1=ctx.createBiquadFilter();f1.type='peaking';f1.frequency.value=300;f1.gain.value=6+intensity*8;f1.Q.value=5;
      const f2=ctx.createBiquadFilter();f2.type='peaking';f2.frequency.value=700;f2.gain.value=4+intensity*6;f2.Q.value=4;
      const f3=ctx.createBiquadFilter();f3.type='peaking';f3.frequency.value=3000;f3.gain.value=3+intensity*5;f3.Q.value=3;
      const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=4000+intensity*2000;lp.Q.value=1;
      // Slight vibrato
      const vDel=ctx.createDelay(.05);vDel.delayTime.value=.01;
      const vLfo=ctx.createOscillator();vLfo.frequency.value=5+intensity*3;
      const vGain=ctx.createGain();vGain.gain.value=.001+intensity*.003;
      vLfo.connect(vGain);vGain.connect(vDel.delayTime);vLfo.start();lfos.push(vLfo);
      f1.connect(f2);f2.connect(f3);f3.connect(lp);lp.connect(vDel);vDel.connect(wet);
      nodes.push({input:dry,output:mrg,splitInput:true,delay:f1});
    }else if(inst.type==='Saxophone'){
      // Warm mid presence + slight saturation
      const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800+intensity*600;bp.Q.value=2+intensity*3;
      const pk=ctx.createBiquadFilter();pk.type='peaking';pk.frequency.value=1800;pk.gain.value=5+intensity*8;pk.Q.value=2;
      const ws=ctx.createWaveShaper();
      const amt=.05+intensity*.15;const n=44100,crv=new Float32Array(n);
      for(let i=0;i<n;i++){const x=(i*2)/n-1;crv[i]=Math.tanh(x*(1+amt*10))}
      ws.curve=crv;ws.oversample='4x';
      bp.connect(pk);pk.connect(ws);ws.connect(wet);
      nodes.push({input:dry,output:mrg,splitInput:true,delay:bp});
    }else if(inst.type==='Guitar'){
      // Comb filter (short delay+feedback) + mid presence
      const del=ctx.createDelay(.05);del.delayTime.value=.004+intensity*.004;
      const fb=ctx.createGain();fb.gain.value=.3+intensity*.5;
      del.connect(fb);fb.connect(del);
      const pk=ctx.createBiquadFilter();pk.type='peaking';pk.frequency.value=1200;pk.gain.value=4+intensity*6;pk.Q.value=2;
      const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=3000+intensity*2000;lp.Q.value=1;
      del.connect(pk);pk.connect(lp);lp.connect(wet);
      nodes.push({input:dry,output:mrg,splitInput:true,delay:del});
    }else if(inst.type==='Flute'){
      // Airy: highpass + narrow high formant + breathy noise
      const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=400+intensity*400;hp.Q.value=1;
      const pk=ctx.createBiquadFilter();pk.type='peaking';pk.frequency.value=2500+intensity*1000;pk.gain.value=6+intensity*8;pk.Q.value=4+intensity*4;
      const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=5000+intensity*3000;lp.Q.value=1;
      hp.connect(pk);pk.connect(lp);lp.connect(wet);
      nodes.push({input:dry,output:mrg,splitInput:true,delay:hp});
    }
  }
  // Special
  const sp=fx.spezial;
  if(sp.type==='Bitcrusher'){
    const ws=ctx.createWaveShaper(),bits=Math.max(1,Math.round(16-sp.value*14)),steps=Math.pow(2,bits);
    const curve=new Float32Array(65536);for(let i=0;i<curve.length;i++){const x=(i*2)/curve.length-1;curve[i]=Math.round(x*steps)/steps}
    ws.curve=curve;nodes.push(ws);
  }
  return{nodes,lfos};
}

function connectChain(src,nodes,dest){
  let cur=src;
  for(const n of nodes){
    if(n.splitInput){cur.connect(n.input);if(n.delay)cur.connect(n.delay);if(n.convolver)cur.connect(n.convolver);cur=n.output}
    else{cur.connect(n);cur=n}
  }
  cur.connect(dest);
}

/* ═══════════════════════════════════════
   RECORDING
   ═══════════════════════════════════════ */
async function startRecording(){
  try{
    const ctx=await ensureCtx();
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    streamRef=stream;
    const analyser=ctx.createAnalyser();analyser.fftSize=2048;
    ctx.createMediaStreamSource(stream).connect(analyser);analyserNode=analyser;
    const mimeType=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
    const mr=mimeType?new MediaRecorder(stream,{mimeType}):new MediaRecorder(stream);recChunks=[];
    mr.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data)};
    mr.onstop=async()=>{
      const blob=new Blob(recChunks,{type:mr.mimeType||mimeType});
      const arrBuf=await blob.arrayBuffer();
      const buf=await ctx.decodeAudioData(arrBuf.slice(0));
      currentBuf=buf;currentB64=ab2b64(encodeWAV(buf));currentWf=extractWf(buf);
      cancelAnimationFrame(visAnim);
      renderMixer();
    };
    mediaRec=mr;mr.start();isRecording=true;recTime=0;
    currentBuf=null;currentB64=null;currentWf=[];
    renderMixer();startLiveVis();
    recTimer=setInterval(()=>{
      recTime+=.1;
      const te=document.getElementById('timer');if(te)te.textContent=recTime.toFixed(1);
      const pf=document.getElementById('rec-prog');if(pf)pf.style.width=(recTime/15*100)+'%';
      if(recTime>=15){mr.stop();stream.getTracks().forEach(t=>t.stop());clearInterval(recTimer);isRecording=false;renderMixer()}
    },100);
  }catch(e){
    alert('Microphone access required.\nPlease allow microphone in your browser settings.');
  }
}

function stopRecording(){
  if(mediaRec&&isRecording){mediaRec.stop();streamRef?.getTracks().forEach(t=>t.stop());clearInterval(recTimer);isRecording=false}
}

function startLiveVis(){
  const cv=document.getElementById('live-canvas');
  if(!cv||!analyserNode)return;
  const c=cv.getContext('2d'),a=analyserNode,d=new Uint8Array(a.frequencyBinCount);
  const draw=()=>{
    visAnim=requestAnimationFrame(draw);a.getByteTimeDomainData(d);
    const W=cv.width,H=cv.height;c.clearRect(0,0,W,H);
    c.strokeStyle='#1d1d1f';c.lineWidth=1.5;c.beginPath();
    const sw=W/d.length;let x=0;
    for(let i=0;i<d.length;i++){const y=(d[i]/128)*H/2;i===0?c.moveTo(x,y):c.lineTo(x,y);x+=sw}
    c.stroke();
  };
  draw();
}

/* ═══════════════════════════════════════
   PLAYBACK
   ═══════════════════════════════════════ */
function stopPlayback(){
  try{sourceNode?.stop()}catch{}
  lfoNodes.forEach(l=>{try{l.stop()}catch{}});
  lfoNodes=[];sourceNode=null;isPlaying=false;
  cancelAnimationFrame(playAnim);cancelAnimationFrame(visAnim);
}

async function playWithFx(){
  if(!currentBuf)return;stopPlayback();
  const rate=currentFx.spezial.type==='Pitch Shifter'?.5+currentFx.spezial.value*1.5:1;
  const hasEffects=Object.values(currentFx).some(e=>e.type!=='None');

  isPlaying=true;renderPlayBtn();

  try{
    let wavBuf;

    // If effects are active, render offline first
    if(hasEffects){
      const offCtx=new OfflineAudioContext(1,Math.ceil(currentBuf.length/rate),currentBuf.sampleRate);
      const src=offCtx.createBufferSource();src.buffer=currentBuf;src.playbackRate.value=rate;
      const{nodes}=buildChain(offCtx,currentFx);
      nodes.length>0?connectChain(src,nodes,offCtx.destination):src.connect(offCtx.destination);
      src.start();
      const rendered=await offCtx.startRendering();
      wavBuf=encodeWAV(rendered);
    }else{
      wavBuf=b642ab(currentB64);
    }

    // Play via Blob URL + HTML5 Audio (reliable on iOS)
    const blob=new Blob([wavBuf],{type:'audio/wav'});
    const blobUrl=URL.createObjectURL(blob);
    const audio=new Audio(blobUrl);
    if(!hasEffects)audio.playbackRate=rate;
    await audio.play();
    sourceNode={stop:()=>{audio.pause();audio.currentTime=0;URL.revokeObjectURL(blobUrl)}};

    // Waveform progress
    const dur=audio.duration||currentBuf.duration/rate;
    const startT=performance.now();
    const upd=()=>{
      const elapsed=(performance.now()-startT)/1000;
      const p=Math.min(elapsed/dur,1);
      const bars=document.querySelectorAll('.wave-bar');
      bars.forEach((b,i)=>{b.classList.toggle('lit',i/bars.length<=p)});
      const head=document.getElementById('wave-head');if(head)head.style.left=(p*100)+'%';
      if(p<1)playAnim=requestAnimationFrame(upd);
    };
    playAnim=requestAnimationFrame(upd);

    audio.onended=()=>{
      isPlaying=false;sourceNode=null;cancelAnimationFrame(playAnim);
      URL.revokeObjectURL(blobUrl);
      document.querySelectorAll('.wave-bar').forEach(b=>b.classList.remove('lit'));
      const head=document.getElementById('wave-head');if(head)head.style.left='0';
      renderStickyPlayer();
    };
  }catch(e){
    console.error('Playback error:',e);
    isPlaying=false;renderStickyPlayer();
  }
}

function renderPlayBtn(){
  const b=document.getElementById('play-btn');
  if(b){b.innerHTML=isPlaying?'■':'▶';b.onclick=isPlaying?function(){stopPlayback();renderStickyPlayer()}:playWithFx}
}

/* ═══════════════════════════════════════
   SAVE / LOAD / DELETE / DOWNLOAD
   ═══════════════════════════════════════ */
async function saveSequence(){
  const inp=document.getElementById('seq-name');
  const name=(inp?.value||'').trim();
  if(!currentB64||!name)return;
  const id=editId||'s-'+Date.now();
  await dbPut(id,currentB64);
  const entry={id,name,effects:{...currentFx},createdAt:editId?sequences.find(s=>s.id===id)?.createdAt:Date.now(),updatedAt:Date.now()};
  if(editId){sequences=sequences.map(s=>s.id===id?entry:s)}else{sequences.push(entry)}
  saveSequences();
  editId=null;currentBuf=null;currentB64=null;currentWf=[];currentFx=defaultFx();openCat=null;
  renderMixer();
}

async function loadSequence(id){
  const seq=sequences.find(s=>s.id===id);if(!seq)return;
  const ctx=getCtx();
  const b64=await dbGet(id);if(!b64)return;
  const buf=await ctx.decodeAudioData(b642ab(b64).slice(0));
  currentBuf=buf;currentB64=b64;currentWf=extractWf(buf);
  currentFx=JSON.parse(JSON.stringify(seq.effects||defaultFx()));
  editId=seq.id;openCat=null;
  switchTab('mixer');
  // Set name after render
  setTimeout(()=>{const inp=document.getElementById('seq-name');if(inp)inp.value=seq.name},10);
}

async function deleteSequence(id){
  if(!confirm('Delete this sequence?'))return;
  await dbDel(id);
  sequences=sequences.filter(s=>s.id!==id);
  saveSequences();renderLib();
}

async function downloadSequence(id){
  const seq=sequences.find(s=>s.id===id);if(!seq)return;
  const ctx=getCtx();
  const b64=await dbGet(id);if(!b64)return;
  const buf=await ctx.decodeAudioData(b642ab(b64).slice(0));
  let final=buf;
  if(Object.values(seq.effects||{}).some(e=>e.type!=='None')){
    const rate=seq.effects?.spezial?.type==='Pitch Shifter'?.5+seq.effects.spezial.value*1.5:1;
    const oc=new OfflineAudioContext(1,Math.ceil(buf.length/rate),buf.sampleRate);
    const s=oc.createBufferSource();s.buffer=buf;s.playbackRate.value=rate;
    const{nodes}=buildChain(oc,seq.effects);nodes.length>0?connectChain(s,nodes,oc.destination):s.connect(oc.destination);
    s.start();final=await oc.startRendering();
  }
  const wav=encodeWAV(final),blob=new Blob([wav],{type:'audio/wav'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=seq.name.replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g,'_')+'.wav';a.click();
}

async function playFromLib(id){
  const seq=sequences.find(s=>s.id===id);if(!seq)return;
  stopPlayback();
  const b64=await dbGet(id);if(!b64)return;
  const hasEffects=Object.values(seq.effects||{}).some(e=>e.type!=='None');
  const rate=seq.effects?.spezial?.type==='Pitch Shifter'?.5+seq.effects.spezial.value*1.5:1;

  try{
    let wavBuf=b642ab(b64);
    if(hasEffects){
      const ctx=getCtx();
      const buf=await ctx.decodeAudioData(b642ab(b64).slice(0));
      const offCtx=new OfflineAudioContext(1,Math.ceil(buf.length/rate),buf.sampleRate);
      const src=offCtx.createBufferSource();src.buffer=buf;src.playbackRate.value=rate;
      const{nodes}=buildChain(offCtx,seq.effects||defaultFx());
      nodes.length>0?connectChain(src,nodes,offCtx.destination):src.connect(offCtx.destination);
      src.start();
      const rendered=await offCtx.startRendering();
      wavBuf=encodeWAV(rendered);
    }
    const blob=new Blob([wavBuf],{type:'audio/wav'});
    const blobUrl=URL.createObjectURL(blob);
    const audio=new Audio(blobUrl);
    if(!hasEffects)audio.playbackRate=rate;
    await audio.play();
    sourceNode={stop:()=>{audio.pause();audio.currentTime=0;URL.revokeObjectURL(blobUrl)}};
    audio.onended=()=>{sourceNode=null;URL.revokeObjectURL(blobUrl)};
  }catch(e){console.error('Playback error:',e)}
}

/* ═══════════════════════════════════════
   RENDER
   ═══════════════════════════════════════ */
function switchTab(t){
  document.getElementById('view-mixer').style.display=t==='mixer'?'':'none';
  document.getElementById('view-lib').style.display=t==='lib'?'':'none';
  const vc=document.getElementById('view-comp');
  vc.style.display=t==='comp'?'flex':'none';
  document.getElementById('tab-mixer').classList.toggle('on',t==='mixer');
  document.getElementById('tab-lib').classList.toggle('on',t==='lib');
  document.getElementById('tab-comp').classList.toggle('on',t==='comp');
  // Hide sticky player on composer
  document.getElementById('sticky-player').style.display=t==='comp'?'none':'';
  if(t==='mixer')renderMixer();else if(t==='lib')renderLib();else if(t==='comp')renderComposer();
  if(t!=='comp')renderStickyPlayer();
}

function renderStickyPlayer(){
  const el=document.getElementById('sticky-player');
  const hasAudio=!!currentBuf;
  const maxWf=Math.max(...currentWf,0.001);

  if(!hasAudio&&!isRecording){el.innerHTML='';return}

  let h='';

  // Waveform
  h+='<div class="sp-wave">';
  if(isRecording){
    h+='<canvas id="live-canvas" width="412" height="56" style="width:100%;height:100%;display:block"></canvas>';
  }else if(currentWf.length>0){
    h+='<div class="wave-bars" style="height:100%;padding:0 12px;gap:2px">';
    currentWf.forEach((v)=>{
      const pct=Math.max(4,(v/maxWf)*85);
      h+=`<div class="wave-bar" style="height:${pct}%"></div>`;
    });
    h+='</div><div class="wave-head" id="wave-head"></div>';
  }
  h+='</div>';

  // Play row (only if audio is loaded and not recording)
  if(hasAudio&&!isRecording){
    const editName=editId?sequences.find(s=>s.id===editId)?.name:'';
    h+='<div class="sp-row">';
    h+=`<button class="sp-play" id="play-btn" onclick="${isPlaying?'stopPlayback();renderStickyPlayer()':'playWithFx()'}">`;
    h+=isPlaying?'■':'▶';
    h+='</button>';
    h+=`<span class="sp-name">${editName?escHtml(editName):'Unsaved recording'}</span>`;
    h+=`<span class="sp-time">${currentBuf.duration.toFixed(1)}s</span>`;
    h+='</div>';
  }

  el.innerHTML=h;
  if(isRecording)setTimeout(startLiveVis,20);
}

function renderMixer(){
  const el=document.getElementById('view-mixer');
  const hasAudio=!!currentBuf;
  const activeFxCount=Object.values(currentFx).filter(e=>e.type!=='None').length;

  let h='';

  // Record controls
  if(!hasAudio||isRecording){
    h+='<div class="rec-area">';
    h+=`<div class="timer" id="timer">${recTime.toFixed(1)}<span> / 15</span></div>`;
    h+=`<button class="rec-btn ${isRecording?'on':'idle'}" onclick="${isRecording?'stopRecording()':'startRecording()'}">`;
    h+=isRecording?'<div class="rec-stop"></div>':'<div class="rec-dot"></div>';
    h+='</button>';
    if(isRecording){
      h+=`<div class="progress-bar"><div class="progress-fill" id="rec-prog" style="width:${recTime/15*100}%"></div></div>`;
    }
    h+='</div>';
  }

  // Audio loaded — show controls
  if(hasAudio&&!isRecording){

        h+='<div class="fx-body">';

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toggleCat(id){openCat=openCat===id?null:id;renderMixer()}
function setFxType(cat,type){currentFx[cat].type=type;renderMixer()}
function setFxVal(cat,val){

function resetFx(){currentFx=defaultFx();openCat=null;renderMixer()}

/* ═══════════════════════════════════════
   COMPOSER
   ═══════════════════════════════════════ */
const COMP_COLORS=['#ff6d2e','#5856d6','#34c759','#ff9500','#af52de','#00c7be','#ff2d55','#007aff'];
const COMP_MAX_TRACKS=8;
const COMP_MAX_SEC=90;
const COMP_UNDO_LIMIT=10;

let comp={
  tracks:[
    {id:'t1',name:'Drum',volume:1,muted:false,clips:[]},
    {id:'t2',name:'Bass',volume:1,muted:false,clips:[]},
    {id:'t3',name:'FX',volume:1,muted:false,clips:[]},
    {id:'t4',name:'Melody',volume:1,muted:false,clips:[]}
  ],
  bpm:120,playhead:0,playing:false,
  loopStart:null,loopEnd:null,
  zoom:40,scrollX:0,snap:1,masterVol:1,
  selectedClip:null,clipMenu:null,dropdown:null,
  undoStack:[],redoStack:[],
  nextClipId:1,nextTrackId:5
};

let compPlayTimer=null,compPlayStart=0,compPlayOffset=0;
let compDrag=null; // {type:'move'|'trimL'|'trimR'|'scroll', clipId, trackId, startX, startBeat, origClip}
let compPinch=null;
let compRendered=false;

function compBeatsToSec(beats){return beats*60/comp.bpm}
function compSecToBeats(sec){return sec*comp.bpm/60}
function compMaxBeats(){return compSecToBeats(COMP_MAX_SEC)}
function compBeatToPx(beat){return beat*comp.zoom}
function compPxToBeat(px){return px/comp.zoom}
function compSnapBeat(beat){
  if(!comp.snap)return beat;
  return Math.round(beat/comp.snap)*comp.snap;
}

function compPushUndo(){
  comp.undoStack.push(JSON.stringify({tracks:comp.tracks,bpm:comp.bpm,loopStart:comp.loopStart,loopEnd:comp.loopEnd}));
  if(comp.undoStack.length>COMP_UNDO_LIMIT)comp.undoStack.shift();
  comp.redoStack=[];
}
function compUndo(){
  if(!comp.undoStack.length)return;
  comp.redoStack.push(JSON.stringify({tracks:comp.tracks,bpm:comp.bpm,loopStart:comp.loopStart,loopEnd:comp.loopEnd}));
  const s=JSON.parse(comp.undoStack.pop());
  comp.tracks=s.tracks;comp.bpm=s.bpm;comp.loopStart=s.loopStart;comp.loopEnd=s.loopEnd;
  renderComposer();compAutoSave();
}
function compRedo(){
  if(!comp.redoStack.length)return;
  comp.undoStack.push(JSON.stringify({tracks:comp.tracks,bpm:comp.bpm,loopStart:comp.loopStart,loopEnd:comp.loopEnd}));
  const s=JSON.parse(comp.redoStack.pop());
  comp.tracks=s.tracks;comp.bpm=s.bpm;comp.loopStart=s.loopStart;comp.loopEnd=s.loopEnd;
  renderComposer();compAutoSave();
}

// Autosave
async function compAutoSave(){
  try{
    const data=JSON.stringify({tracks:comp.tracks,bpm:comp.bpm,loopStart:comp.loopStart,loopEnd:comp.loopEnd,masterVol:comp.masterVol,nextClipId:comp.nextClipId,nextTrackId:comp.nextTrackId});
    await dbPut('comp-autosave',data);
  }catch(e){}
}
async function compAutoLoad(){
  try{
    const data=await dbGet('comp-autosave');
    if(data){
      const s=JSON.parse(data);
      comp.tracks=s.tracks||comp.tracks;comp.bpm=s.bpm||120;
      comp.loopStart=s.loopStart;comp.loopEnd=s.loopEnd;
      comp.masterVol=s.masterVol||1;comp.nextClipId=s.nextClipId||1;comp.nextTrackId=s.nextTrackId||5;
    }
  }catch(e){}
}

// Get clip audio buffer
async function compGetClipBuf(seqId){
  const b64=await dbGet(seqId);if(!b64)return null;
  const ctx=getCtx();
  return await ctx.decodeAudioData(b642ab(b64).slice(0));
}

// ─── RENDER ───
function renderComposer(){
  const el=document.getElementById('view-comp');
  const totalBeats=Math.max(compMaxBeats(),32);
  const totalPx=compBeatToPx(totalBeats);
  const trackCount=comp.tracks.length;

  let h='';

  // Sticky header
  h+='<div class="comp-sticky">';
  // Master waveform
  h+='<div class="comp-master-wave" id="comp-master-wave"><canvas id="comp-master-cv"></canvas></div>';
  // Controls row
  h+='<div class="comp-controls">';
  h+=`<button class="comp-btn" onclick="comp.playhead=0;if(comp.playing)compStopPlay();compUpdatePlayheads();compDrawMasterWave()">⏮</button>`;
  h+=`<button class="comp-btn ${comp.playing?'acc':''}" onclick="compTogglePlay()">${comp.playing?'■ Pause':'▶ Play'}</button>`;
  h+=`<div class="comp-bpm"><button class="comp-bpm" onclick="compSetBpm(-1)">−</button>`;
  h+=`<input id="comp-bpm-inp" type="number" value="${comp.bpm}" onchange="compSetBpmVal(this.value)" min="60" max="200">`;
  h+=`<button onclick="compSetBpm(1)">+</button><span style="font-size:8px;color:var(--t3);margin-left:2px">BPM</span></div>`;
  h+=`<button class="comp-btn" onclick="compUndo()" ${comp.undoStack.length?'':'style="opacity:.3;pointer-events:none"'}>↩</button>`;
  h+=`<button class="comp-btn" onclick="compRedo()" ${comp.redoStack.length?'':'style="opacity:.3;pointer-events:none"'}>↪</button>`;
  h+=`<div class="comp-vol">♪<input type="range" min="0" max="1" step=".01" value="${comp.masterVol}" oninput="comp.masterVol=+this.value"></div>`;
  h+='</div>';
  h+='</div>';

  // Timeline (scrollable)
  h+='<div class="comp-timeline" id="comp-timeline">';
  comp.tracks.forEach((tr,ti)=>{
    const color=COMP_COLORS[ti%COMP_COLORS.length];
    h+=`<div class="comp-track" data-tid="${tr.id}">`;
    h+=`<div class="comp-track-hdr">`;
    h+=`<span class="comp-track-name" style="color:${color}">${escHtml(tr.name)}</span>`;
    h+=`<input type="range" class="comp-track-vol" min="0" max="1" step=".01" value="${tr.volume}" oninput="compSetTrackVol('${tr.id}',+this.value)" style="width:50px">`;
    h+=`<button class="comp-track-mute${tr.muted?' on':''}" onclick="compToggleMute('${tr.id}')">${tr.muted?'M':'M'}</button>`;
    h+=`<button class="comp-track-add-clip" onclick="compShowClipDropdown(event,'${tr.id}')">+ Clip</button>`;
    h+=`</div>`;
    // Lane
    h+=`<div class="comp-lane" data-tid="${tr.id}" style="width:${totalPx}px">`;
    // Grid lines
    for(let b=0;b<=totalBeats;b++){
      const x=compBeatToPx(b);
      const isMeasure=b%4===0;
      h+=`<div class="comp-grid-line" style="left:${x}px;opacity:${isMeasure?.5:.2}"></div>`;
    }
    // Loop region
    if(comp.loopStart!==null&&comp.loopEnd!==null){
      const lx=compBeatToPx(comp.loopStart),lw=compBeatToPx(comp.loopEnd-comp.loopStart);
      h+=`<div class="comp-loop-region" style="left:${lx}px;width:${lw}px"></div>`;
    }
    // Clips
    tr.clips.forEach(cl=>{
      const cx=compBeatToPx(cl.startBeat);
      const cw=Math.max(compBeatToPx(cl.durationBeats),4);
      const sel=comp.selectedClip===cl.id;
      h+=`<div class="comp-clip${sel?' selected':''}" data-cid="${cl.id}" style="left:${cx}px;width:${cw}px;background:${color}" ontouchstart="compClipTouch(event,'${cl.id}','${tr.id}')" onmousedown="compClipMouse(event,'${cl.id}','${tr.id}')">`;
      h+=`<div class="trim-l"></div>`;
      h+=`<span style="pointer-events:none">${escHtml(cl.name||'Clip')}</span>`;
      if(cl.looped)h+='<span style="pointer-events:none;margin-left:2px;font-size:7px">⟳</span>';
      h+=`<div class="trim-r"></div>`;
      h+='</div>';
    });
    // Playhead
    h+=`<div class="comp-playhead" id="ph-${tr.id}" style="left:${compBeatToPx(comp.playhead)}px"></div>`;
    h+='</div></div>';
  });
  h+='</div>';

  // Footer
  h+='<div class="comp-footer">';
  h+=`<button class="comp-btn" onclick="compCycleSnap()">Snap: ${comp.snap===0?'Off':comp.snap===1?'1 Beat':'1/'+Math.round(1/comp.snap)}</button>`;
  h+=`<button class="comp-btn ${comp.loopStart!==null?'on':''}" onclick="compToggleLoop()">${comp.loopStart!==null?'Loop ✓':'Loop'}</button>`;
  if(comp.tracks.length<COMP_MAX_TRACKS){
    h+=`<button class="comp-btn" onclick="compAddTrack()">+ Track</button>`;
  }
  h+=`<button class="comp-btn acc" onclick="compExport()">Export WAV</button>`;
  h+='</div>';

  el.innerHTML=h;
  compRendered=true;

  // Setup lane touch events for scrolling/playhead
  const timeline=document.getElementById('comp-timeline');
  if(timeline){
    timeline.addEventListener('touchstart',compTimelineTouch,{passive:false});
    timeline.addEventListener('touchmove',compTimelineMove,{passive:false});
    timeline.addEventListener('touchend',compTimelineEnd);
  }

  compDrawMasterWave();
}

// ─── TRACK/CLIP MANAGEMENT ───
function compAddTrack(){
  if(comp.tracks.length>=COMP_MAX_TRACKS)return;
  compPushUndo();
  comp.tracks.push({id:'t'+comp.nextTrackId,name:'Track '+comp.nextTrackId,volume:1,muted:false,clips:[]});
  comp.nextTrackId++;
  renderComposer();compAutoSave();
}

function compSetTrackVol(tid,v){
  const t=comp.tracks.find(t=>t.id===tid);if(t)t.volume=v;
}

function compToggleMute(tid){
  compPushUndo();
  const t=comp.tracks.find(t=>t.id===tid);if(t)t.muted=!t.muted;
  renderComposer();compAutoSave();
}

function compShowClipDropdown(ev,tid){
  if(sequences.length===0){alert('No sounds in library. Record some first!');return}
  closeCompMenus();
  const rect=ev.target.getBoundingClientRect();
  let h=`<div class="comp-overlay" onclick="closeCompMenus()"></div>`;
  h+=`<div class="comp-dropdown" style="top:${rect.bottom+4}px;left:${Math.min(rect.left,window.innerWidth-200)}px">`;
  sequences.forEach(s=>{
    h+=`<div class="comp-dropdown-item" onclick="compAddClip('${tid}','${s.id}','${escHtml(s.name)}')">${escHtml(s.name)}</div>`;
  });
  h+='</div>';
  const wrap=document.createElement('div');wrap.id='comp-menus';wrap.innerHTML=h;
  document.body.appendChild(wrap);
}

function compAddClip(tid,seqId,name){
  closeCompMenus();compPushUndo();
  const tr=comp.tracks.find(t=>t.id===tid);if(!tr)return;
  // Find seq to get duration
  const seq=sequences.find(s=>s.id===seqId);
  // Default duration: 4 beats, will be adjusted when audio loads
  let startBeat=comp.playhead;
  // Or after last clip
  if(tr.clips.length>0){
    const last=tr.clips.reduce((a,b)=>a.startBeat+a.durationBeats>b.startBeat+b.durationBeats?a:b);
    const lastEnd=last.startBeat+last.durationBeats;
    if(lastEnd>startBeat)startBeat=lastEnd;
  }
  startBeat=compSnapBeat(startBeat);
  const clip={id:'c'+(comp.nextClipId++),seqId,name:name||'Clip',startBeat,durationBeats:4,volume:1,looped:false,trimStart:0,trimEnd:1};
  tr.clips.push(clip);

  // Load actual duration
  (async()=>{
    const buf=await compGetClipBuf(seqId);
    if(buf){
      clip.durationBeats=compSnapBeat(Math.max(comp.snap||.25,compSecToBeats(buf.duration)));
      clip._dur=buf.duration;
      renderComposer();compAutoSave();
    }
  })();

  renderComposer();compAutoSave();
}

function compDeleteClip(clipId){
  compPushUndo();
  comp.tracks.forEach(tr=>{tr.clips=tr.clips.filter(c=>c.id!==clipId)});
  comp.selectedClip=null;comp.clipMenu=null;
  renderComposer();compAutoSave();
}

function compToggleClipLoop(clipId){
  compPushUndo();closeCompMenus();
  comp.tracks.forEach(tr=>{
    const cl=tr.clips.find(c=>c.id===clipId);
    if(!cl)return;
    cl.looped=!cl.looped;
    if(cl.looped){
      // Double the duration (snapped), shift clips after it
      const origEnd=cl.startBeat+cl.durationBeats;
      cl.durationBeats=compSnapBeat(cl.durationBeats*2)||cl.durationBeats+1;
      const newEnd=cl.startBeat+cl.durationBeats;
      const shift=newEnd-origEnd;
      if(shift>0){
        tr.clips.forEach(other=>{
          if(other.id!==cl.id&&other.startBeat>=origEnd) other.startBeat+=shift;
        });
      }
    }else{
      // Un-loop: halve duration, shift subsequent clips back
      const origEnd=cl.startBeat+cl.durationBeats;
      cl.durationBeats=compSnapBeat(cl.durationBeats/2)||Math.max(comp.snap||.25,cl.durationBeats/2);
      const newEnd=cl.startBeat+cl.durationBeats;
      const shift=origEnd-newEnd;
      if(shift>0){
        tr.clips.forEach(other=>{
          if(other.id!==cl.id&&other.startBeat>=origEnd) other.startBeat=Math.max(0,other.startBeat-shift);
        });
      }
    }
  });
  comp.selectedClip=null;
  renderComposer();compAutoSave();
}

function compSetClipVol(clipId,v){
  comp.tracks.forEach(tr=>tr.clips.forEach(c=>{
    if(c.id===clipId)c.volume=parseFloat(v);
  }));
}

function closeCompMenus(){
  const m=document.getElementById('comp-menus');if(m)m.remove();
}

function compFindClip(clipId){
  for(const tr of comp.tracks)for(const c of tr.clips)if(c.id===clipId)return c;
  return null;
}

// ─── BPM ───
function compSetBpm(delta){comp.bpm=Math.max(60,Math.min(200,comp.bpm+delta));renderComposer();compAutoSave()}
function compSetBpmVal(v){comp.bpm=Math.max(60,Math.min(200,parseInt(v)||120));renderComposer();compAutoSave()}

// ─── SNAP ───
function compCycleSnap(){
  const snaps=[1,.5,.25,.125,0];
  const i=snaps.indexOf(comp.snap);
  comp.snap=snaps[(i+1)%snaps.length];
  renderComposer();
}

// ─── LOOP ───
function compToggleLoop(){
  if(comp.loopStart!==null){comp.loopStart=null;comp.loopEnd=null}
  else{comp.loopStart=0;comp.loopEnd=8}
  renderComposer();compAutoSave();
}

// ─── TOUCH HANDLING ───
let compTouchTimer=null;
let compTouchStart=null;

function compClipTouch(ev,clipId,trackId){
  ev.stopPropagation();
  const t=ev.touches[0];
  const target=ev.target;
  const isLeft=target.classList.contains('trim-l');
  const isRight=target.classList.contains('trim-r');
  const clip=compFindClip(clipId);if(!clip)return;

  compTouchStart={x:t.clientX,y:t.clientY,time:Date.now(),clipId,trackId,moved:false};

  if(isLeft||isRight){
    // Trim immediately
    compPushUndo();
    compDrag={type:isLeft?'trimL':'trimR',clipId,trackId,startX:t.clientX,origStart:clip.startBeat,origDur:clip.durationBeats};
    return;
  }

  // Long press detection for move
  compTouchTimer=setTimeout(()=>{
    compPushUndo();
    compDrag={type:'move',clipId,trackId,startX:t.clientX,origStart:clip.startBeat};
    // Haptic feedback if available
    if(navigator.vibrate)navigator.vibrate(30);
  },300);

  // Touch move/end handlers on window
  const onMove=(e)=>{
    const tt=e.touches[0];
    const dx=Math.abs(tt.clientX-compTouchStart.x);
    const dy=Math.abs(tt.clientY-compTouchStart.y);
    if(dx>5||dy>5)compTouchStart.moved=true;

    if(compDrag){
      e.preventDefault();
      const deltaPx=tt.clientX-compDrag.startX;
      const deltaBeat=compPxToBeat(deltaPx);
      if(compDrag.type==='move'){
        clip.startBeat=Math.max(0,compSnapBeat(compDrag.origStart+deltaBeat));
      }else if(compDrag.type==='trimL'){
        const newStart=Math.max(0,compSnapBeat(compDrag.origStart+deltaBeat));
        const endBeat=compDrag.origStart+compDrag.origDur;
        if(newStart<endBeat-.125){clip.startBeat=newStart;clip.durationBeats=endBeat-newStart}
      }else if(compDrag.type==='trimR'){
        const newDur=Math.max(.125,compSnapBeat(compDrag.origDur+deltaBeat));
        clip.durationBeats=newDur;
      }
      compUpdateClipPositions();
    }
  };
  const onEnd=()=>{
    clearTimeout(compTouchTimer);
    window.removeEventListener('touchmove',onMove);
    window.removeEventListener('touchend',onEnd);
    if(compDrag){compDrag=null;compAutoSave();renderComposer();return}
    // Short tap = select + menu
    if(!compTouchStart.moved&&Date.now()-compTouchStart.time<300){
      compShowClipMenu(clipId,compTouchStart.x,compTouchStart.y);
      renderComposer();
    }
  };
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('touchend',onEnd);
}

function compClipMouse(ev,clipId,trackId){
  // Desktop support
  const clip=compFindClip(clipId);if(!clip)return;
  const isLeft=ev.target.classList.contains('trim-l');
  const isRight=ev.target.classList.contains('trim-r');

  if(isLeft||isRight){
    compPushUndo();
    compDrag={type:isLeft?'trimL':'trimR',clipId,trackId,startX:ev.clientX,origStart:clip.startBeat,origDur:clip.durationBeats};
  }else{
    compShowClipMenu(clipId,ev.clientX,ev.clientY);
    renderComposer();return;
  }

  const onMove=(e)=>{
    if(!compDrag)return;
    const deltaPx=e.clientX-compDrag.startX;
    const deltaBeat=compPxToBeat(deltaPx);
    if(compDrag.type==='trimL'){
      const newStart=Math.max(0,compSnapBeat(compDrag.origStart+deltaBeat));
      const endBeat=compDrag.origStart+compDrag.origDur;
      if(newStart<endBeat-.125){clip.startBeat=newStart;clip.durationBeats=endBeat-newStart}
    }else if(compDrag.type==='trimR'){
      clip.durationBeats=Math.max(.125,compSnapBeat(compDrag.origDur+deltaBeat));
    }
    compUpdateClipPositions();
  };
  const onUp=()=>{
    compDrag=null;compAutoSave();renderComposer();
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('mouseup',onUp);
  };
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onUp);
}

function compUpdateClipPositions(){
  // Update DOM positions without full re-render
  comp.tracks.forEach(tr=>{
    tr.clips.forEach(cl=>{
      const el=document.querySelector(`[data-cid="${cl.id}"]`);
      if(el){el.style.left=compBeatToPx(cl.startBeat)+'px';el.style.width=Math.max(compBeatToPx(cl.durationBeats),4)+'px'}
    });
  });
}

// Timeline touch (scroll, playhead, pinch-zoom)
function compTimelineTouch(ev){
  if(ev.touches.length===2){
    ev.preventDefault();
    compPinch={d:Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY),zoom:comp.zoom};
    return;
  }
  // Single touch on empty area → set playhead
  if(ev.target.classList.contains('comp-lane')){
    const rect=ev.target.getBoundingClientRect();
    const x=ev.touches[0].clientX-rect.left;
    comp.playhead=Math.max(0,compSnapBeat(compPxToBeat(x)));
    compUpdatePlayheads();
  }
}
function compTimelineMove(ev){
  if(compPinch&&ev.touches.length===2){
    ev.preventDefault();
    const d=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    const scale=d/compPinch.d;
    comp.zoom=Math.max(10,Math.min(200,compPinch.zoom*scale));
    renderComposer();
    return;
  }
}
function compTimelineEnd(){compPinch=null}

function compUpdatePlayheads(){
  comp.tracks.forEach(tr=>{
    const ph=document.getElementById('ph-'+tr.id);
    if(ph)ph.style.left=compBeatToPx(comp.playhead)+'px';
  });
  compDrawMasterPlayhead();
}

// ─── MASTER WAVEFORM ───
function compDrawMasterWave(){
  const cv=document.getElementById('comp-master-cv');if(!cv)return;
  const wrap=document.getElementById('comp-master-wave');if(!wrap)return;
  cv.width=wrap.clientWidth;cv.height=wrap.clientHeight;
  const c=cv.getContext('2d'),W=cv.width,H=cv.height;
  c.clearRect(0,0,W,H);

  const totalBeats=Math.max(compMaxBeats(),32);
  // Grid
  c.strokeStyle='rgba(0,0,0,.06)';c.lineWidth=1;
  for(let b=0;b<=totalBeats;b+=4){
    const x=(b/totalBeats)*W;
    c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();
  }
  // Clips as blocks
  comp.tracks.forEach((tr,ti)=>{
    if(tr.muted)return;
    const color=COMP_COLORS[ti%COMP_COLORS.length];
    c.fillStyle=color+'44';
    tr.clips.forEach(cl=>{
      const x=(cl.startBeat/totalBeats)*W;
      const w=Math.max((cl.durationBeats/totalBeats)*W,1);
      const laneH=H/comp.tracks.length;
      c.fillRect(x,ti*laneH,w,laneH);
    });
  });
  // Loop region
  if(comp.loopStart!==null){
    const lx=(comp.loopStart/totalBeats)*W,lw=((comp.loopEnd-comp.loopStart)/totalBeats)*W;
    c.fillStyle='rgba(0,229,255,.1)';c.fillRect(lx,0,lw,H);
    c.strokeStyle='rgba(0,229,255,.5)';c.lineWidth=1.5;
    c.beginPath();c.moveTo(lx,0);c.lineTo(lx,H);c.stroke();
    c.beginPath();c.moveTo(lx+lw,0);c.lineTo(lx+lw,H);c.stroke();
  }
  compDrawMasterPlayhead();

  // Tap to set playhead
  cv.onclick=(e)=>{
    const rect=cv.getBoundingClientRect();
    const x=e.clientX-rect.left;
    comp.playhead=compSnapBeat((x/cv.width)*totalBeats);
    compUpdatePlayheads();
  };
}

function compDrawMasterPlayhead(){
  const cv=document.getElementById('comp-master-cv');if(!cv)return;
  const c=cv.getContext('2d'),W=cv.width,H=cv.height;
  const totalBeats=Math.max(compMaxBeats(),32);
  // Redraw (simple approach)
  compDrawMasterWaveInner(c,W,H,totalBeats);
  // Playhead
  const px=(comp.playhead/totalBeats)*W;
  c.strokeStyle='#ff3b30';c.lineWidth=2;
  c.beginPath();c.moveTo(px,0);c.lineTo(px,H);c.stroke();
}

function compDrawMasterWaveInner(c,W,H,totalBeats){
  c.clearRect(0,0,W,H);
  c.strokeStyle='rgba(0,0,0,.06)';c.lineWidth=1;
  for(let b=0;b<=totalBeats;b+=4){const x=(b/totalBeats)*W;c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke()}
  comp.tracks.forEach((tr,ti)=>{
    if(tr.muted)return;
    const color=COMP_COLORS[ti%COMP_COLORS.length];
    c.fillStyle=color+'44';
    tr.clips.forEach(cl=>{
      const x=(cl.startBeat/totalBeats)*W;
      const w=Math.max((cl.durationBeats/totalBeats)*W,1);
      const laneH=H/comp.tracks.length;
      c.fillRect(x,ti*laneH,w,laneH);
    });
  });
  if(comp.loopStart!==null){
    const lx=(comp.loopStart/totalBeats)*W,lw=((comp.loopEnd-comp.loopStart)/totalBeats)*W;
    c.fillStyle='rgba(0,229,255,.1)';c.fillRect(lx,0,lw,H);
  }
}

// ─── PLAYBACK (offline render → HTML5 Audio for iOS) ───
let compAudio=null; // HTML5 Audio element

async function compTogglePlay(){
  if(comp.playing){compStopPlay();return}

  // Find total duration
  let maxBeat=0;
  comp.tracks.forEach(tr=>tr.clips.forEach(cl=>{
    const end=cl.startBeat+cl.durationBeats;
    if(end>maxBeat)maxBeat=end;
  }));
  if(maxBeat===0)return;

  comp.playing=true;renderComposer();

  try{
    const startBeat=comp.playhead;
    const endBeat=comp.loopEnd!==null?comp.loopEnd:maxBeat;
    const renderStart=comp.loopStart!==null&&comp.playhead<comp.loopStart?comp.loopStart:startBeat;
    const totalSec=Math.min(compBeatsToSec(endBeat-renderStart),COMP_MAX_SEC);
    if(totalSec<=0){comp.playing=false;renderComposer();return}

    const sr=44100;
    const offCtx=new OfflineAudioContext(1,Math.ceil(totalSec*sr),sr);

    for(const tr of comp.tracks){
      if(tr.muted)continue;
      for(const cl of tr.clips){
        const clipEnd=cl.startBeat+cl.durationBeats;
        if(clipEnd<=renderStart||cl.startBeat>=endBeat)continue;
        const buf=await compGetClipBuf(cl.seqId);
        if(!buf)continue;

        const src=offCtx.createBufferSource();src.buffer=buf;
        const gain=offCtx.createGain();gain.gain.value=cl.volume*tr.volume*comp.masterVol;
        src.connect(gain);gain.connect(offCtx.destination);

        const clipOffsetBeats=Math.max(0,cl.startBeat-renderStart);
        const clipStartSec=compBeatsToSec(clipOffsetBeats);
        const audioOffset=cl.startBeat<renderStart?compBeatsToSec(renderStart-cl.startBeat):0;
        const clipDurSec=compBeatsToSec(cl.durationBeats);

        if(cl.looped){
          src.loop=true;
          src.loopEnd=buf.duration;
          src.start(clipStartSec,audioOffset,Math.min(clipDurSec,totalSec-clipStartSec));
        }else{
          const durSec=Math.min(buf.duration-audioOffset,clipDurSec);
          if(durSec>0)src.start(clipStartSec,audioOffset,durSec);
        }
      }
    }

    const rendered=await offCtx.startRendering();
    const wavArrayBuf=encodeWAV(rendered);
    const blob=new Blob([wavArrayBuf],{type:'audio/wav'});
    const blobUrl=URL.createObjectURL(blob);
    const audio=new Audio(blobUrl);

    // Loop global playback if loop region is set
    if(comp.loopStart!==null&&comp.loopEnd!==null)audio.loop=true;

    await audio.play();
    compAudio=audio;
    compAudio._blobUrl=blobUrl;

    // Animate playhead
    compPlayStart=performance.now();
    compPlayOffset=renderStart;
    compPlayTimer=requestAnimationFrame(compPlayTick);

    audio.onended=()=>{
      comp.playing=false;compAudio=null;
      cancelAnimationFrame(compPlayTimer);
      comp.playhead=renderStart;
      renderComposer();
    };

  }catch(e){
    console.error('Composer playback error:',e);
    comp.playing=false;renderComposer();
  }
}

function compStopPlay(){
  comp.playing=false;
  cancelAnimationFrame(compPlayTimer);
  if(compAudio){
    try{compAudio.pause();compAudio.currentTime=0}catch(e){}
    if(compAudio._blobUrl)URL.revokeObjectURL(compAudio._blobUrl);
    compAudio=null;
  }
  renderComposer();
}

function compPlayTick(){
  if(!comp.playing||!compAudio)return;
  const elapsed=compAudio.currentTime;
  comp.playhead=compPlayOffset+compSecToBeats(elapsed);

  // Handle global loop wrap
  if(comp.loopStart!==null&&comp.loopEnd!==null){
    const loopDurBeats=comp.loopEnd-comp.loopStart;
    while(comp.playhead>=comp.loopEnd)comp.playhead-=loopDurBeats;
  }

  // End
  if(comp.playhead>=compMaxBeats()&&!compAudio.loop){
    compStopPlay();comp.playhead=0;renderComposer();return;
  }

  compUpdatePlayheads();
  compPlayTimer=requestAnimationFrame(compPlayTick);
}

// ─── EXPORT ───
async function compExport(){
  if(comp.playing)compStopPlay();

  // Find total duration
  let maxBeat=0;
  comp.tracks.forEach(tr=>tr.clips.forEach(cl=>{
    const end=cl.startBeat+cl.durationBeats;
    if(end>maxBeat)maxBeat=end;
  }));
  if(maxBeat===0){alert('No clips to export');return}

  const totalSec=Math.min(compBeatsToSec(maxBeat),COMP_MAX_SEC);
  const sr=44100;
  const offCtx=new OfflineAudioContext(2,Math.ceil(totalSec*sr),sr);

  for(const tr of comp.tracks){
    if(tr.muted)continue;
    for(const cl of tr.clips){
      const buf=await compGetClipBuf(cl.seqId);
      if(!buf)continue;
      const src=offCtx.createBufferSource();src.buffer=buf;
      const gain=offCtx.createGain();gain.gain.value=cl.volume*tr.volume*comp.masterVol;
      src.connect(gain);gain.connect(offCtx.destination);
      const startSec=compBeatsToSec(cl.startBeat);
      const clipDurSec=compBeatsToSec(cl.durationBeats);
      if(cl.looped){
        src.loop=true;src.loopEnd=buf.duration;
        src.start(startSec,0,clipDurSec);
      }else{
        src.start(startSec,0,Math.min(buf.duration,clipDurSec));
      }
    }
  }

  const rendered=await offCtx.startRendering();
  const wav=encodeWAV(rendered);
  const blob=new Blob([wav],{type:'audio/wav'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='mouth-mixer-track.wav';a.click();
}
